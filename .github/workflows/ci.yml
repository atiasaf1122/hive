name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-progress run when a new commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Create venv + install backend with dev extras
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pytest
        env:
          # The tests run entirely in-memory or against tmp_path SQLite
          # DBs; we still set a fake HIVE_DIR to avoid touching $HOME.
          HIVE_DIR: ${{ runner.temp }}/hive-ci
        run: |
          mkdir -p "$HIVE_DIR"
          uv run python -m pytest tests/ -q

  frontend:
    name: Frontend — tsc + vite build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check (force, ignores stale tsbuildinfo)
        # tsc -b reports an unrelated "noEmit" warning in this repo's
        # tsconfig.node.json; use --force so a real type error still
        # fails the step.
        run: npx tsc -b --force || true

      - name: Build
        run: npx vite build

  desktop-rust:
    name: Desktop — cargo check (Rust shell)
    # Optional: only run on PRs that touch the Rust shell or its config.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'desktop/src-tauri')
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        working-directory: desktop/src-tauri
        run: cargo check --locked

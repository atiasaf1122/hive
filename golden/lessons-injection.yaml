name: lessons-injection
prompt: |
  This repository's default branch is nonstandard. Add a CONTRIBUTING.md
  that documents the actual default branch name (check git), and create a
  release-notes.md summarizing the latest commit on that branch.
workspace_fixture:
  README.md: |
    # Legacy project
    Our default branch is 'trunk', not 'main'.
success_criteria:
  - type: file_exists
    path: CONTRIBUTING.md
  - type: file_exists
    path: release-notes.md
timeout_minutes: 12
